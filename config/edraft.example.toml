[identity]
name = "Your Name"
email = "you@example.com"

[scan]
folders = ["inbox"]
scan_unread_only = true
max_message_age_hours = 24
max_messages_per_scan = 25
thread_context_messages = 5
reply_mode = "auto"
dry_run = false
processed_category = ""
apply_processed_category = false

[filters]
exclude_newsletters = true
exclude_automated = true
exclude_cc_only = true
require_direct_address = true
newsletter_header_detection = true
sender_patterns = [
  "no-reply",
  "noreply",
  "do-not-reply",
  "donotreply",
  "mailer-daemon",
]
domain_patterns = [
  "mailer.",
  "notifications.",
]
group_alias_patterns = [
  "all@",
  "team@",
  "staff@",
  "newsletter@",
  "announce@",
]
max_direct_recipients = 4
address_score_threshold = 2

[llm]
provider = "openai"
model = "gpt-5.4"
reasoning_effort = "medium"
style_instructions = "Write concise, professional replies. Prefer short responses unless more detail is clearly needed. Do not invent facts, do not over-commit, and ask a clarifying question if context is insufficient."
signature_block = "Thanks,\nJude"
max_input_chars = 12000

[style_corpus]
enabled = true
source_folders = ["sentitems"]
sync_max_messages = 250
retrieve_same_sender_first = true
fts_fallback_enabled = true
max_examples = 3
max_example_chars = 280
min_reply_chars = 40
min_pair_confidence = 0.6
pairing_confidence_weight = 1.5
same_sender_boost = 0.75
query_rank_max_bonus = 0.5
query_rank_step_penalty = 0.05
recency_max_bonus = 0.3
recency_decay_days = 90
eval_holdout_days = 30
eval_max_cases = 10

[state]
database_path = "./data/edraft.sqlite3"

[logging]
level = "INFO"
format = "json"
